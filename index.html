<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questões Vesicobolhosas</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #e6e9f2;
      --ink: #1e2430;
      --muted: #667085;
      --accent: #7c5cff;
      --accent-soft: #efeaff;
      --ok-bg: #ecfdf3;
      --ok-bd: #a6f4c5;
      --ok-tx: #05603a;
      --bad-bg: #fef3f2;
      --bad-bd: #fecdca;
      --bad-tx: #b42318;
      --neutral-bg: #fff7ed;
      --neutral-bd: #fed7aa;
      --neutral-tx: #9a3412;
      --shadow: 0 14px 34px rgba(18, 25, 38, .08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fafbff, #f3f5fb);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      background: linear-gradient(135deg, #ffffff, #f6f2ff);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.02;
      letter-spacing: -.05em;
    }
    .sub {
      color: var(--muted);
      line-height: 1.65;
      max-width: 78ch;
      margin-bottom: 18px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .92rem;
      color: var(--muted);
      font-weight: 700;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: .95rem;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow);
    }
    button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .progress {
      margin-top: 18px;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #edf1f7;
      border: 1px solid #e5e8f0;
    }
    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #7c5cff, #9e88ff);
      transition: width .24s ease;
    }
    .q {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    .qhead {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .num {
      min-width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--accent-soft);
      color: #5f44df;
      font-weight: 900;
    }
    .qtitle {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.58;
      font-weight: 800;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
      color: var(--muted);
      background: #fafbff;
      border: 1px solid var(--line);
    }
    .qimg {
      width: 100%;
      max-width: 760px;
      display: block;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin: 12px 0 14px;
    }
    .opts {
      display: grid;
      gap: 10px;
      margin: 10px 0 14px;
    }
    label.opt {
      display: block;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      cursor: pointer;
      transition: .16s ease;
    }
    label.opt:hover {
      transform: translateY(-1px);
      border-color: #d8dcf0;
    }
    label.opt input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .feedback {
      display: none;
      border-radius: 18px;
      padding: 16px;
      margin-top: 8px;
    }
    .feedback.ok {
      display: block;
      background: var(--ok-bg);
      border: 1px solid var(--ok-bd);
      color: var(--ok-tx);
    }
    .feedback.bad {
      display: block;
      background: var(--bad-bg);
      border: 1px solid var(--bad-bd);
      color: var(--bad-tx);
    }
    .feedback.neutral {
      display: block;
      background: var(--neutral-bg);
      border: 1px solid var(--neutral-bd);
      color: var(--neutral-tx);
    }
    .answerLine {
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 1rem;
    }
    .explain {
      display: grid;
      gap: 10px;
      color: var(--ink);
      margin-top: 10px;
    }
    .box {
      border-radius: 14px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(0,0,0,.06);
      padding: 12px 14px;
      line-height: 1.6;
    }
    .box strong {
      display: inline-block;
      margin-bottom: 4px;
    }
    .box ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }
    .disease-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .mini {
      border-radius: 12px;
      background: #fff;
      border: 1px solid #eceef5;
      padding: 10px 12px;
      line-height: 1.55;
      font-size: .93rem;
    }
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.5;
      margin-top: 28px;
      padding-bottom: 8px;
    }
    @media (max-width: 900px) {
      .disease-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 760px) {
      .wrap { padding: 14px; }
      .hero { padding: 20px; border-radius: 20px; }
      .q { padding: 16px; border-radius: 18px; }
    }
  </style>
</head>

  <div class="wrap">
    <section class="hero">
      <h1>Questões Vesicobolhosas</h1>
      
      <div class="toolbar">

          <button class="secondary" onclick="resetQuiz()">Resetar prova</button>

      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </section>

    <main id="quiz"></main>

    <div class="footer">

    </div>
  </div>

ns": ["Penfigoide de membranas mucosas", "Pênfigo vulgar", "Penfigoide bolhoso", "Hailey-Hailey"], "answer": 0, "why": "A melhor hipótese é <b>penfigoide de membranas mucosas</b>, porque o componente <b>cicatricial ocular</b> é uma das pistas mais fortes da doença.", "strengths": ["Olho é sítio crítico e potencialmente devastador.", "Mucosa + cicatriz + olho é uma combinação de alto rendimento.", "Distingue-se do PV pela fisiopatologia subepitelial e pelo risco cicatricial."], "wrong": "PV pode ter mucosa, mas não é a doença clássica de cicatrização ocular progressiva; PB é menos centrado em mucosa; Hailey-Hailey é intertriginosa."}, {"type": "imagem direta", "img": "images/05_pemphigus_vegetans_clinical_1.png", "q": "Observe a imagem. Placas vegetantes verrucosas em áreas intertriginosas, dentro do espectro do pênfigo, sugerem:", "options": ["Pênfigo vegetante", "Hailey-Hailey", "Darier", "Pênfigo foliáceo"], "answer": 0, "why": "A resposta correta é <b>pênfigo vegetante</b>, uma variante clínica do pênfigo vulgar com tendência a lesões vegetantes em dobras.", "strengths": ["Predileção por intertrígens.", "Placas vegetantes e úmidas são uma pista muito útil.", "Mantém a lógica autoimune do espectro do PV."], "wrong": "Hailey-Hailey e Darier também podem envolver dobras, mas o contexto vegetante bolhoso do espectro do pênfigo favorece pênfigo vegetante."}, {"type": "histologia + raciocínio", "img": "images/30_dermatitis_herpetiformis_histology_1.png", "q": "Observe a histologia. Paciente com prurido intenso, lesões excoriadas em cotovelos e joelhos, episódios de distensão abdominal, diarreia intermitente e deficiência de ferro. Somando a imagem ao quadro clínico, qual é o diagnóstico mais provável?", "options": ["Dermatite herpetiforme", "Pênfigo por IgA", "Penfigoide bolhoso", "MMP"], "answer": 0, "why": "A resposta correta é <b>dermatite herpetiforme</b>. A imagem com <b>neutrófilos nas papilas dérmicas</b>, associada a prurido intenso em superfícies extensoras e       });
      updateStats();
    }

    function getSelected(index) {
      const checked = document.querySelector(`input[name="q${index}"]:checked`);
      return checked ? Number(checked.value) : null;
    }

    function diseaseBlock(correctName) {
      const d = diseaseInfo[correctName];
      if (!d) return '';
      return `
        <div class="box">
          <strong>Mini-aula da doença correta</strong>
          <div class="disease-grid" style="margin-top:8px;">
            <div class="mini"><strong>Epidemiologia</strong><br>${d.epi}</div>
            <div class="mini"><strong>Genética / base molecular</strong><br>${d.gen}</div>
            <div class="mini"><strong>Quadro clínico clássico</strong><br>${d.clin}</div>
            <div class="mini"><strong>Histologia</strong><br>${d.histo}</div>
            <div class="mini"><strong>IF direta / indireta</strong><br>${d.if}</div>
            <div class="mini"><strong>Como matar a questão</strong><br>${d.extra}</div>
          </div>
        </div>
      `;
    }

    function buildExplanation(item, isRight) {
      const correct = item.answer;
      const correctName = item.options[correct];
      const letter = String.fromCharCode(97 + correct);
      const strengths = item.strengths.map(s => `<li>${s}</li>`).join('');
      return `
        <div class="answerLine">${isRight ? 'Correto.' : 'Incorreto.'}</div>
        <div><strong>Resposta certa:</strong> ${letter}) ${correctName}</div>
        <div class="explain">
          <div class="box">
            <strong>Por que essa é a correta nesta questão</strong><br>
            ${item.why}
          </div>
          <div class="box">
            <strong>Pontos fortes para gravar</strong>
            <ul>${strengths}</ul>
          </div>
          ${diseaseBlock(correctName)}
          <div class="box">
            <strong>Por que as outras não são as melhores aqui</strong><br>
            ${item.wrong}
          </div>
        </div>
      `;
    }

    function checkAnswer(index) {
      const selected = getSelected(index);
      const fb = document.getElementById(`fb-${index}`);
      const item = questions[index];

      if (selected === null) {
        fb.dataset.done = '';
        fb.dataset.right = '';
        fb.className = 'feedback neutral';
        fb.innerHTML = `
          <div class="answerLine">Você ainda não marcou uma alternativa.</div>
          <div>Escolha uma opção para corrigir esta questão.</div>
        `;
        return;
      }

      const isRight = selected === item.answer;
      fb.dataset.done = '1';
      fb.dataset.right = isRight ? '1' : '0';
      fb.className = 'feedback ' + (isRight ? 'ok' : 'bad');
      fb.innerHTML = buildExplanation(item, isRight);
      updateStats();
    }

    function expandAll() {
      questions.forEach((item, i) => {
        const selected = getSelected(i);
        if (selected === null) {
          document.querySelector(`input[name="q${i}"][value="${item.answer}"]`).checked = true;
        }
        checkAnswer(i);
      });
    }

    function resetQuiz() {
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateStats() {
      const fbs = [...document.querySelectorAll('.feedback[data-done="1"]')];
      const done = fbs.length;
      const score = fbs.filter(el => el.dataset.right === '1').length;
      doneCount.textContent = done;
      scoreCount.textContent = score;
      bar.style.width = questions.length ? `${(done / questions.length) * 100}%` : '0%';
    }

    render();
  </script>
</body>
</html>
